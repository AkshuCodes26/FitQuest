<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FitQuest — Diet Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <script>(function(){var t=localStorage.getItem('fq_theme')||'light';document.documentElement.setAttribute('data-theme',t);})();</script>
  <style>
    [data-theme="light"] { --bg:#fdf6ff; --card:#fff; --text:#3a2d5f; --light:#8a7aaa; --border:#ede8ff; --nav:#fff; --input:#fdfaff; --hover:#f5f0ff; --shadow:rgba(100,60,180,0.09); }
    [data-theme="dark"]  { --bg:#1a1025; --card:#241836; --text:#e8deff; --light:#9a88cc; --border:#3d2d5f; --nav:#1e1430; --input:#2d1f45; --hover:#2d1f45; --shadow:rgba(0,0,0,0.35); }
    :root { --pink:#ff6b9d; --purple:#c77dff; --blue:#72b7f5; --teal:#5ecfcf; --yellow:#ffd166; --green:#6bcb77; --orange:#ff9a3c; }
    * { margin:0; padding:0; box-sizing:border-box; transition:background 0.3s,color 0.3s,border-color 0.3s; }
    body { font-family:'Nunito',sans-serif; background:var(--bg); min-height:100vh; }

    /* NAV */
    nav { background:var(--nav); border-bottom:2px solid var(--border); padding:0 28px; display:flex; align-items:center; justify-content:space-between; height:64px; position:sticky; top:0; z-index:100; box-shadow:0 2px 20px var(--shadow); }
    .nav-brand { display:flex; align-items:center; gap:10px; text-decoration:none; }
    .nav-brand-icon { width:40px; height:40px; border-radius:12px; background:linear-gradient(135deg,var(--pink),var(--purple)); display:flex; align-items:center; justify-content:center; }
    .nav-brand-icon svg { width:22px; height:22px; stroke:white; fill:none; stroke-width:2; stroke-linecap:round; }
    .nav-title { font-family:'Fredoka One',cursive; font-size:24px; background:linear-gradient(135deg,var(--pink),var(--purple)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .nav-links { display:flex; gap:4px; }
    .nav-link { padding:8px 14px; border-radius:10px; font-size:13px; font-weight:800; color:var(--light); text-decoration:none; transition:all 0.2s; display:flex; align-items:center; gap:6px; }
    .nav-link svg { width:15px; height:15px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; }
    .nav-link:hover,.nav-link.active { background:linear-gradient(135deg,var(--pink),var(--purple)); color:#fff; }
    .btn-logout { padding:8px 14px; border:2px solid var(--border); border-radius:10px; background:transparent; font-family:'Nunito',sans-serif; font-size:13px; font-weight:800; color:var(--light); cursor:pointer; transition:all 0.2s; display:flex; align-items:center; gap:6px; }
    .btn-logout svg { width:15px; height:15px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; }
    .btn-logout:hover { background:#fff0f3; color:var(--pink); border-color:var(--pink); }

    main { max-width:1100px; margin:0 auto; padding:28px 20px; }

    /* PAGE HEADER */
    .page-header { background:linear-gradient(135deg,var(--green),var(--teal)); border-radius:20px; padding:22px 28px; margin-bottom:26px; display:flex; align-items:center; justify-content:space-between; box-shadow:0 8px 24px rgba(107,203,119,0.28); }
    .page-header-text h2 { font-family:'Fredoka One',cursive; font-size:26px; color:#fff; }
    .page-header-text p { color:rgba(255,255,255,0.85); font-size:13px; font-weight:600; margin-top:3px; }
    .page-header-icon { width:56px; height:56px; background:rgba(255,255,255,0.2); border-radius:16px; display:flex; align-items:center; justify-content:center; animation:bounce 2s ease infinite; }
    .page-header-icon svg { width:30px; height:30px; stroke:white; fill:none; stroke-width:2; stroke-linecap:round; }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }

    /* MACRO CARDS */
    .macros { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:24px; }
    .macro-card { background:var(--card); border-radius:18px; padding:18px; border:2px solid var(--border); text-align:center; transition:transform 0.2s; }
    .macro-card:hover { transform:translateY(-3px); }
    .macro-icon { width:44px; height:44px; border-radius:13px; display:flex; align-items:center; justify-content:center; margin:0 auto 8px; }
    .macro-icon svg { width:22px; height:22px; fill:none; stroke-width:2; stroke-linecap:round; }
    .macro-val { font-family:'Fredoka One',cursive; font-size:24px; color:var(--text); }
    .macro-label { font-size:11px; color:var(--light); font-weight:800; text-transform:uppercase; letter-spacing:0.5px; }

    .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px; }
    .card { background:var(--card); border-radius:20px; padding:22px; border:2px solid var(--border); }
    .card-head { display:flex; align-items:center; gap:8px; margin-bottom:18px; }
    .card-head svg { width:20px; height:20px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; }
    .card-head h3 { font-family:'Fredoka One',cursive; font-size:18px; color:var(--text); }

    /* TABS */
    .tabs { display:flex; background:var(--hover); border-radius:13px; padding:4px; margin-bottom:16px; gap:4px; }
    .tab-btn { flex:1; padding:10px; border:none; border-radius:10px; font-family:'Nunito',sans-serif; font-size:13px; font-weight:800; cursor:pointer; transition:all 0.3s; background:transparent; color:var(--light); display:flex; align-items:center; justify-content:center; gap:6px; }
    .tab-btn svg { width:15px; height:15px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; }
    .tab-btn.active { background:linear-gradient(135deg,var(--green),var(--teal)); color:#fff; box-shadow:0 4px 12px rgba(107,203,119,0.3); }

    /* FILTERS */
    .filter-row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px; }
    .filter-pill { padding:7px 14px; border-radius:99px; border:2px solid var(--border); font-size:12px; font-weight:800; color:var(--light); cursor:pointer; background:var(--card); transition:all 0.2s; }
    .filter-pill:hover,.filter-pill.active { background:linear-gradient(135deg,var(--green),var(--teal)); color:#fff; border-color:transparent; }

    /* SEARCH */
    .search-wrap { position:relative; margin-bottom:14px; }
    .search-wrap svg { position:absolute; left:13px; top:50%; transform:translateY(-50%); width:16px; height:16px; stroke:var(--light); fill:none; stroke-width:2; stroke-linecap:round; pointer-events:none; }
    .search-wrap input { width:100%; padding:11px 14px 11px 40px; border:2px solid var(--border); border-radius:13px; font-family:'Nunito',sans-serif; font-size:13px; font-weight:600; color:var(--text); background:var(--input); outline:none; }
    .search-wrap input:focus { border-color:var(--green); }

    /* FOOD CARDS */
    .food-grid { display:grid; grid-template-columns:1fr; gap:10px; max-height:380px; overflow-y:auto; padding-right:4px; }
    .food-grid::-webkit-scrollbar { width:5px; }
    .food-grid::-webkit-scrollbar-track { background:var(--border); border-radius:99px; }
    .food-grid::-webkit-scrollbar-thumb { background:var(--green); border-radius:99px; }
    .food-card { background:var(--input); border:2px solid var(--border); border-radius:14px; padding:14px; display:flex; align-items:center; justify-content:space-between; transition:all 0.2s; }
    .food-card:hover { border-color:var(--green); background:var(--hover); transform:translateX(3px); }
    .food-left { display:flex; align-items:center; gap:12px; }
    .food-icon { width:42px; height:42px; border-radius:12px; background:rgba(107,203,119,0.12); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .food-icon svg { width:22px; height:22px; stroke:var(--green); fill:none; stroke-width:2; stroke-linecap:round; }
    .food-name { font-size:14px; font-weight:800; color:var(--text); margin-bottom:3px; }
    .food-meta { font-size:11px; color:var(--light); font-weight:700; display:flex; gap:8px; }
    .food-cal { font-family:'Fredoka One',cursive; font-size:18px; color:var(--green); }
    .log-btn { padding:8px 14px; border:none; border-radius:10px; background:linear-gradient(135deg,var(--green),var(--teal)); color:#fff; font-family:'Nunito',sans-serif; font-size:12px; font-weight:800; cursor:pointer; display:flex; align-items:center; gap:5px; transition:transform 0.2s; flex-shrink:0; }
    .log-btn svg { width:13px; height:13px; stroke:white; fill:none; stroke-width:2.5; stroke-linecap:round; }
    .log-btn:hover { transform:scale(1.05); }

    /* FORM */
    .fg { margin-bottom:13px; }
    .fg label { display:flex; align-items:center; gap:5px; font-size:11px; font-weight:800; color:var(--text); margin-bottom:5px; text-transform:uppercase; letter-spacing:0.5px; }
    .fg label svg { width:13px; height:13px; stroke:var(--purple); fill:none; stroke-width:2; stroke-linecap:round; flex-shrink:0; }
    .fg input,.fg select { width:100%; padding:10px 13px; border:2px solid var(--border); border-radius:12px; font-family:'Nunito',sans-serif; font-size:13px; font-weight:600; color:var(--text); background:var(--input); outline:none; transition:border-color 0.2s; appearance:none; }
    .fg input:focus,.fg select:focus { border-color:var(--green); background:var(--card); }
    .frow { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .btn-add { width:100%; padding:12px; border:none; border-radius:13px; background:linear-gradient(135deg,var(--green),var(--teal)); color:#fff; font-family:'Nunito',sans-serif; font-size:14px; font-weight:800; cursor:pointer; margin-top:4px; transition:transform 0.2s; display:flex; align-items:center; justify-content:center; gap:8px; }
    .btn-add svg { width:16px; height:16px; stroke:white; fill:none; stroke-width:2.5; stroke-linecap:round; }
    .btn-add:hover { transform:translateY(-2px); }

    /* QUICK LOG */
    .quick-log { background:rgba(107,203,119,0.08); border:2px solid rgba(107,203,119,0.3); border-radius:16px; padding:16px; margin-bottom:16px; }
    .quick-log h4 { font-family:'Fredoka One',cursive; font-size:16px; color:var(--text); margin-bottom:12px; display:flex; align-items:center; gap:8px; }
    .quick-log h4 svg { width:18px; height:18px; stroke:var(--green); fill:none; stroke-width:2; stroke-linecap:round; }

    /* LOG TABLE */
    .log-table { width:100%; border-collapse:collapse; }
    .log-table th { font-size:11px; font-weight:800; color:var(--light); text-transform:uppercase; letter-spacing:0.5px; padding:8px 12px; text-align:left; border-bottom:2px solid var(--border); }
    .log-table td { padding:11px 12px; font-size:13px; font-weight:700; color:var(--text); border-bottom:1px solid var(--border); }
    .log-table tr:last-child td { border-bottom:none; }
    .del-btn { background:none; border:none; cursor:pointer; display:flex; align-items:center; transition:transform 0.2s; color:var(--light); }
    .del-btn svg { width:15px; height:15px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; }
    .del-btn:hover { color:var(--pink); transform:scale(1.2); }

    .alert { padding:11px 14px; border-radius:12px; font-size:13px; font-weight:700; margin-bottom:13px; display:none; align-items:center; gap:8px; }
    .alert svg { width:15px; height:15px; flex-shrink:0; fill:none; stroke:currentColor; stroke-width:2; stroke-linecap:round; }
    .alert.success { background:#e8faf0; color:#2d8a57; border:2px solid #a8e6c0; display:flex; }
    .alert.error { background:#fff0f3; color:#c0392b; border:2px solid #ffb3c1; display:flex; }

    .empty-state { text-align:center; padding:30px; color:var(--light); font-weight:700; font-size:14px; }
    .empty-state svg { width:44px; height:44px; stroke:var(--border); fill:none; stroke-width:1.5; stroke-linecap:round; margin-bottom:10px; }

    @media(max-width:700px){ .grid2{grid-template-columns:1fr} .macros{grid-template-columns:1fr 1fr} }
  </style>
</head>
<body>

<nav>
  <a class="nav-brand" href="/dashboard">
    <div class="nav-brand-icon"><svg viewBox="0 0 24 24"><path d="M6 4v16M18 4v16M3 8h3M18 8h3M3 16h3M18 16h3M6 12h12"/></svg></div>
    <span class="nav-title">FitQuest</span>
  </a>
  <div class="nav-links">
    <a class="nav-link" href="/dashboard"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home</a>
    <a class="nav-link active" href="/diet"><svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="2"/><line x1="9" y1="12" x2="15" y2="12"/></svg>Diet</a>
    <a class="nav-link" href="/exercise"><svg viewBox="0 0 24 24"><path d="M6 4v16M18 4v16M3 8h3M18 8h3M3 16h3M18 16h3M6 12h12"/></svg>Exercise</a>
    <a class="nav-link" href="/profile"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Profile</a>
  </div>
  <button class="btn-logout" onclick="logout()"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Logout</button>
</nav>

<main>
  <div class="page-header">
    <div class="page-header-text">
      <h2>Diet Tracker</h2>
      <p>Fuel your body right — track every meal, every bite!</p>
    </div>
    <div class="page-header-icon">
      <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="2"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>
    </div>
  </div>

  <div class="macros">
    <div class="macro-card">
      <div class="macro-icon" style="background:rgba(255,107,157,0.12)"><svg viewBox="0 0 24 24" style="stroke:#ff6b9d"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg></div>
      <div class="macro-val" id="totalCal">0</div><div class="macro-label">Calories Today</div>
    </div>
    <div class="macro-card">
      <div class="macro-icon" style="background:rgba(199,125,255,0.12)"><svg viewBox="0 0 24 24" style="stroke:#c77dff"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg></div>
      <div class="macro-val" id="totalProtein">0g</div><div class="macro-label">Protein</div>
    </div>
    <div class="macro-card">
      <div class="macro-icon" style="background:rgba(255,209,102,0.12)"><svg viewBox="0 0 24 24" style="stroke:#ffd166"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/></svg></div>
      <div class="macro-val" id="totalCarbs">0g</div><div class="macro-label">Carbs</div>
    </div>
    <div class="macro-card">
      <div class="macro-icon" style="background:rgba(255,154,60,0.12)"><svg viewBox="0 0 24 24" style="stroke:#ff9a3c"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg></div>
      <div class="macro-val" id="totalFat">0g</div><div class="macro-label">Fat</div>
    </div>
  </div>

  <div class="grid2">
    <!-- FOOD BROWSER -->
    <div class="card">
      <div class="card-head" style="color:var(--green)">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <h3>Browse and Log Food</h3>
      </div>
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab(this,'browse')">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          Browse Foods
        </button>
        <button class="tab-btn" onclick="switchTab(this,'add')">
          <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add New Food
        </button>
      </div>

      <!-- BROWSE TAB -->
      <div id="browseTab">
        <div class="search-wrap">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="searchFood" placeholder="Search foods..." oninput="filterFoods()"/>
        </div>
        <div class="filter-row">
          <div class="filter-pill active" onclick="filterMeal(this,'')">All</div>
          <div class="filter-pill" onclick="filterMeal(this,'Breakfast')">Breakfast</div>
          <div class="filter-pill" onclick="filterMeal(this,'Lunch')">Lunch</div>
          <div class="filter-pill" onclick="filterMeal(this,'Dinner')">Dinner</div>
          <div class="filter-pill" onclick="filterMeal(this,'Snack')">Snack</div>
        </div>
        <div class="food-grid" id="foodGrid">
          <div class="empty-state"><svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="2"/></svg>Loading foods...</div>
        </div>
      </div>

      <!-- ADD FOOD TAB -->
      <div id="addTab" style="display:none">
        <div class="alert" id="addAlert"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span></span></div>
        <div class="fg"><label><svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="2"/></svg>Food Name</label><input type="text" id="fName" placeholder="e.g. Idli, Dosa, Salad..."/></div>
        <div class="frow">
          <div class="fg"><label><svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>Calories</label><input type="number" id="fCal" placeholder="kcal"/></div>
          <div class="fg"><label><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>Protein (g)</label><input type="number" id="fProt" placeholder="0"/></div>
        </div>
        <div class="frow">
          <div class="fg"><label><svg viewBox="0 0 24 24"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/></svg>Carbs (g)</label><input type="number" id="fCarb" placeholder="0"/></div>
          <div class="fg"><label><svg viewBox="0 0 24 24"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg>Fat (g)</label><input type="number" id="fFat" placeholder="0"/></div>
        </div>
        <div class="frow">
          <div class="fg"><label><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/></svg>Region</label>
            <select id="fRegion"><option value="">Select region</option><option value="South Indian">South Indian</option><option value="North Indian">North Indian</option><option value="Continental">Continental</option><option value="Chinese">Chinese</option><option value="Other">Other</option></select>
          </div>
          <div class="fg"><label><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Meal Type</label>
            <select id="fMeal"><option value="">Select type</option><option value="Breakfast">Breakfast</option><option value="Lunch">Lunch</option><option value="Dinner">Dinner</option><option value="Snack">Snack</option></select>
          </div>
        </div>
        <button class="btn-add" onclick="addFood(this)"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add to Database</button>
      </div>
    </div>

    <!-- RIGHT COLUMN -->
    <div style="display:flex;flex-direction:column;gap:18px;">
      <!-- QUICK LOG -->
      <div class="card">
        <div class="card-head" style="color:var(--orange)">
          <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <h3>Quick Log</h3>
        </div>
        <div class="quick-log">
          <h4><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Type any food manually</h4>
          <div class="frow" style="margin-bottom:8px">
            <div class="fg"><label><svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/></svg>Food Name</label><input type="text" id="qFoodName" placeholder="e.g. Apple"/></div>
            <div class="fg"><label><svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>Calories</label><input type="number" id="qFoodCal" placeholder="89"/></div>
          </div>
          <button class="btn-add" onclick="quickLog()"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Log This Food</button>
        </div>
        <div class="alert" id="quickAlert"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span></span></div>
      </div>

      <!-- TODAY'S LOG -->
      <div class="card">
        <div class="card-head" style="color:var(--yellow)">
          <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          <h3>Today's Meals</h3>
        </div>
        <div id="todayLog">
          <div class="empty-state">
            <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="2"/></svg>
            No meals logged yet today!
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<script>
const API = '/api';
let allFoods = [], currentMealFilter = '';
let todayCal=0, todayProt=0, todayCarb=0, todayFat=0;

async function loadFoods() {
  try {
    const res = await fetch(`${API}/diet`, {credentials:'include'});
    if (!res.ok) { window.location.href='/login'; return; }
    allFoods = await res.json();
    renderFoods(allFoods);
  } catch(e) {}
}

function renderFoods(foods) {
  const grid = document.getElementById('foodGrid');
  if (!foods.length) {
    grid.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="2"/></svg>No foods found!</div>';
    return;
  }
  grid.innerHTML = foods.map(f=>`
    <div class="food-card">
      <div class="food-left">
        <div class="food-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke="var(--green)"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="2"/><line x1="9" y1="12" x2="15" y2="12"/></svg></div>
        <div>
          <div class="food-name">${f.Food_Name}</div>
          <div class="food-meta"><span>${f.Region_Type}</span><span>•</span><span>${f.Meal_Type}</span>${f.Protein_g?`<span>• P:${f.Protein_g}g</span>`:''}</div>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
        <div class="food-cal">${f.Calories}</div>
        <button class="log-btn" onclick="logFood(${f.Diet_ID},${f.Calories},${f.Protein_g||0},${f.Carbs_g||0},${f.Fat_g||0},'${f.Food_Name}')">
          <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Log
        </button>
      </div>
    </div>`).join('');
}

function filterFoods() {
  const search = document.getElementById('searchFood').value.toLowerCase();
  let filtered = currentMealFilter ? allFoods.filter(f=>f.Meal_Type===currentMealFilter) : allFoods;
  if (search) filtered = filtered.filter(f=>f.Food_Name.toLowerCase().includes(search));
  renderFoods(filtered);
}

function filterMeal(el, meal) {
  document.querySelectorAll('.filter-pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active'); currentMealFilter = meal; filterFoods();
}

function switchTab(btn, tab) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('browseTab').style.display = tab==='browse'?'block':'none';
  document.getElementById('addTab').style.display = tab==='add'?'block':'none';
}

async function logFood(dietId, cal, prot, carb, fat, name) {
  try {
    const res = await fetch(`${API}/log`, {method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify({diet_id:dietId,calories_consumed:cal})});
    if (res.ok) {
      todayCal+=cal; todayProt+=prot; todayCarb+=carb; todayFat+=fat;
      updateMacros(); loadTodayLogs(); showToast(`${name} logged!`);
    }
  } catch(e) {}
}

async function quickLog() {
  const name = document.getElementById('qFoodName').value.trim();
  const cal = parseFloat(document.getElementById('qFoodCal').value);
  if (!name||!cal) return showAlert('quickAlert','error','Enter food name and calories!');
  try {
    const res = await fetch(`${API}/log`,{method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify({calories_consumed:cal,notes:`Quick log: ${name}`})});
    if (res.ok) {
      todayCal+=cal; updateMacros();
      document.getElementById('qFoodName').value=''; document.getElementById('qFoodCal').value='';
      showAlert('quickAlert','success',`${name} logged! (${cal} kcal)`);
      loadTodayLogs();
    }
  } catch(e) {}
}

async function addFood(btn) {
  const body = {food_name:document.getElementById('fName').value.trim(),calories:parseFloat(document.getElementById('fCal').value),protein_g:parseFloat(document.getElementById('fProt').value)||0,carbs_g:parseFloat(document.getElementById('fCarb').value)||0,fat_g:parseFloat(document.getElementById('fFat').value)||0,region_type:document.getElementById('fRegion').value,meal_type:document.getElementById('fMeal').value};
  if (!body.food_name||!body.calories||!body.region_type||!body.meal_type) return showAlert('addAlert','error','Please fill all required fields!');
  btn.disabled=true;
  try {
    const res = await fetch(`${API}/diet`,{method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify(body)});
    if (res.ok) { showAlert('addAlert','success','Food added successfully!'); document.getElementById('fName').value=''; loadFoods(); }
  } catch(e) {}
  btn.disabled=false;
}

function updateMacros() {
  document.getElementById('totalCal').textContent=Math.round(todayCal);
  document.getElementById('totalProtein').textContent=Math.round(todayProt)+'g';
  document.getElementById('totalCarbs').textContent=Math.round(todayCarb)+'g';
  document.getElementById('totalFat').textContent=Math.round(todayFat)+'g';
}

async function loadTodayLogs() {
  try {
    const today=new Date().toISOString().split('T')[0];
    const res=await fetch(`${API}/log?start_date=${today}`,{credentials:'include'});
    const logs=await res.json();
    const foodLogs=logs.filter(l=>l.Food_Name||l.Notes);
    const el=document.getElementById('todayLog');
    if (!foodLogs.length) { el.innerHTML='<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="2"/></svg>No meals logged yet today!</div>'; return; }
    el.innerHTML=`<table class="log-table"><tr><th>Food</th><th>Calories</th><th></th></tr>
      ${foodLogs.map(l=>`<tr><td>${l.Food_Name||l.Notes||'Manual entry'}</td><td style="color:var(--green);font-family:'Fredoka One',cursive">${l.Food_Calories||l.Calories_Consumed||0}</td><td><button class="del-btn" onclick="deleteLog(${l.Log_ID})"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M9 6V4h6v2"/></svg></button></td></tr>`).join('')}
    </table>`;
  } catch(e) {}
}

async function deleteLog(id) { await fetch(`${API}/log/${id}`,{method:'DELETE',credentials:'include'}); loadTodayLogs(); }

function showAlert(id,type,msg){ const e=document.getElementById(id); e.className=`alert ${type}`; e.querySelector('span').textContent=msg; setTimeout(()=>e.style.display='none',3000); }

function showToast(msg) {
  const t=document.createElement('div');
  t.style.cssText='position:fixed;bottom:20px;right:20px;background:linear-gradient(135deg,#6bcb77,#5ecfcf);color:#fff;padding:12px 20px;border-radius:14px;font-family:Nunito,sans-serif;font-size:13px;font-weight:800;z-index:999;box-shadow:0 4px 16px rgba(107,203,119,0.4)';
  t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),2500);
}

async function logout(){ await fetch(`${API}/logout`,{method:'POST',credentials:'include'}); window.location.href='/login'; }

loadFoods(); loadTodayLogs();
</script>
</body>
</html>
